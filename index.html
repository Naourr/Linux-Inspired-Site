<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linux Inspired Site</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="/assets/ascii_p1.gif">
</head>
<body>
    <nav class="row">
        <div class="icons-left">
            <img src="/assets/menu.png">
        </div>
        <div id="date">Mon, Jan 01, 2026</div>
        <div class="icons-right">
            <img src="/assets/wifi.png">
            <img src="/assets/bluetooth.png">
            <img src="/assets/battery.png">
        </div>
    </nav>
    <main class="row">
        <div class="clock">
            <span id="hour">07</span> : <span id="minute">39</span>
            <br>
            <span id="day">30</span>
            <br>
            <span id="month">Jan</span> - <span id="weekday">Mon</span>
            <br>
        </div>
        <div class="col desktop-icon">
            <img src="/assets/folder-purple.png" width="30px">
            <p>Projects</p>
        </div>
        <div class="dashboard">
            <fieldset class="col" id="main-stage">
                
            </fieldset>
            <aside>
                <fieldset class="col" id="list-stage">
                    
                </fieldset>
                <fieldset class="row" id="folder-stage">
                    <legend>Folder Stage</legend>
                    <div data-category="websites">
                        <img src="/assets/folder-purple.png">
                        <p>Websites</p>
                    </div>
                    <div data-category="web_apps">
                        <img src="/assets/folder-purple.png">
                        <p>Apps</p>
                    </div>
                    <div data-category="games">
                        <img src="/assets/folder-purple.png">
                        <p>Games</p>
                    </div>
                    <div data-category="guitar">
                        <img src="/assets/folder-purple.png">
                        <p>Guitar</p>
                    </div>
                    <div data-category="assignments">
                        <img src="/assets/folder-purple.png">
                        <p>College</p>
                    </div>
                    <div data-category="python">
                        <img src="/assets/folder-purple.png">
                        <p>Python</p>
                    </div>
                </fieldset>
            </aside>
        </div>
    </main>
    <div class="row fixed-elements">
        <div class="row popup">
            <p>That unfortunately doesnt do anything..</p>
        </div>
        <div class="row loading active">
            <img src="/assets/ascii_p1.gif" width="230px">
        </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
